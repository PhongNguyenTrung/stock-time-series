version: 2

updates:
  # ── Python dependencies ────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    # Gom minor + patch thành 1 PR/tuần, tránh spam
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    # Major version = có thể breaking change → PR riêng, merge thủ công
    ignore:
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "scikit-learn"
        update-types: ["version-update:semver-major"]
      - dependency-name: "statsmodels"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - python

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
