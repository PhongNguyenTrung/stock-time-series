name: Data Refresh

# Lịch thị trường HOSE/HNX: Thứ 2–6, 09:00–15:00 (UTC+7 = 02:00–08:00 UTC)
# Data sẵn sàng ~15:30 CH giờ VN = ~08:30 UTC
# Cron chạy lúc 09:00 UTC = 16:00 CH giờ VN — sau khi data chắc chắn có
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-download (bỏ qua freshness cache)"
        required: false
        default: "false"
        type: boolean

  schedule:
    - cron: "0 9 * * 1-5"   # Thứ 2–6, 09:00 UTC = 16:00 CH giờ VN (sau đóng cửa)

jobs:
  refresh:
    name: Refresh Stock Data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # vnstock (VCI) thường bị block ngoài IP Việt Nam.
      # Pipeline tự động fallback sang yfinance (.VN suffix).
      - name: Run pipeline (collect → preprocess → split)
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/run_pipeline.py --skip-upload --skip-sheets $FORCE_FLAG

      # ── Google Sheets upload (production) ────────────────────────────────
      # Kích hoạt khi 2 secrets được cấu hình:
      #   GOOGLE_SERVICE_ACCOUNT_JSON  ← nội dung JSON key của service account
      #   SHEETS_SPREADSHEET_ID        ← ID từ URL của Google Sheet
      - name: Upload to Google Sheets
        if: ${{ env.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
        run: python -c "from src.sheets import upload_to_sheets; upload_to_sheets()"

      - name: Report results
        if: always()
        run: |
          echo "=== Split info ==="
          cat data/processed/splits/split_info.json || echo "(không có file)"
          echo ""
          echo "=== Số dòng raw data ==="
          wc -l data/raw/*.csv 2>/dev/null || echo "(không có file)"
