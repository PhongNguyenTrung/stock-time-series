name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:
  # Cron data_refresh dùng GITHUB_TOKEN để commit lại docs/data/ — push này
  # KHÔNG kích hoạt nhánh `push` ở trên (GitHub anti-loop). Dùng workflow_run
  # để pages tự deploy sau mỗi lần Data Refresh hoàn tất.
  workflow_run:
    workflows: ["Data Refresh"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
